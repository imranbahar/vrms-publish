<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Transaction Receipt</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/withdrawRequest.css">
    <link rel="icon" type="image/x-icon" href="/images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" >
    <link rel="stylesheet" href="/css/try.css">
    <script src="/js/try.js"></script>
</head>
<body>
    <div th:replace="navbarA :: navbar(${userID})"></div>
    <div class="container-fluid">
        <!-- Left Panel -->
        <div class="left-panel" style="background-color: #f3e3d3;"></div>
        <!-- Center Panel -->
        <div class="center-panel">
            <h1>UPLOAD TRANSACTION RECEIPT</h1>
            <form th:action="@{/submitReceipt}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="withdrawID" th:value="${withdrawID}" />
                <input type="hidden" name="userID" th:value="${userID}" />
                <div class="form-group">
                    <label for="receipt">Upload PDF Receipt</label>
                    <input type="file" class="form-control" id="receipt" name="receipt" accept="application/pdf" required>
                </div>
                <div>
                    <button type="button" class="btn btn-secondary" th:onclick="'window.location.href=\'/withdrawApproval?userID=' + ${userID} + '\''">CANCEL</button>
                    <button type="submit" class="btn btn-primary">SUBMIT</button>
                </div>
            </form>
        </div>
        <!-- Right Panel -->
        <div class="right-panel"></div>
    </div>
</body>
</html>
