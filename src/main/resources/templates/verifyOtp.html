<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/account.css">
    <link rel="icon" type="image/x-icon" href="/images/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container-fluid">
        <!-- Left Panel -->
        <div class="left-panel">
            <h1>VERIFY OTP</h1>
            <form th:action="@{/verifyOtp}" method="post">
                <input type="hidden" name="email" th:value="${email}">
                <div class="form-group">
                    <label for="otp">ENTER OTP</label>
                    <input type="text" id="otp" name="otp" class="form-control" required>
                </div>
                <div>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='/userLogin'">CANCEL</button>
                    <button type="submit" class="btn btn-primary">VERIFY</button>
                </div>
            </form>
        </div>
        <!-- Right Panel -->
        <div class="right-panel">
            <h1>WELCOME TO</h1>
            <h1>VEHICLE SHARING</h1>
            <h1>MANAGEMENT</h1>
            <h1>SERVICE SYSTEM</h1>
            <p>Rent your desire vehicle to rent</p>
        </div>
    </div>
</body>
</html>
