<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicle Sharing Management Service System</title>
    <link rel="stylesheet" href="/css/homepage.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" >
    <link rel="stylesheet" href="/css/try.css">
    <script src="/js/try.js"></script>
    <link rel="icon" type="image/x-icon" href="/images/logo.png">
</head>
<body id="body-pd" >
    <div th:replace="navbarVO :: navbar(${user.userID})"></div>
    <div class="container-fluid py-5" style="max-width:1200px;">
        <div class="row mb-4">
            <div class="col-12 col-md-8">
                <div class="rounded p-4" style="background:#d32f2f ;">
                    <h2 class="mb-2" style="font-weight:700;">Start <span style="color:#fff7f0 ;">manage</span> vehicle with VRMS</h2>
                    <p style="color:#ffffff;">Simple step experience</p>
                    <button class="btn btn-warning" style="font-weight:600;"
                        th:onclick="'window.location.href=\'/chooseOwner?userID=' + ${user.userID} + '\''">
                        Get Started
                    </button>
                </div>
            </div>
            <div class="col-12 col-md-4 d-flex align-items-center justify-content-center">
                <a th:href="@{/vehicleOwnerProfile(userID=${user.userID})}" title="View Profile" style="width:100%;">
                    <img th:src="@{/userPic(userID=${user.userID})}" alt="Profile Picture"
                        style="width:100%;height:100%;min-height:100px;max-height:170px;min-width:140px;max-width:100%;border-radius:18px;box-shadow:0 4px 24px #bdbdfc;object-fit:cover;cursor:pointer;display:block;">
                </a>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="rounded p-4 text-center" style="background:#d32f2f ;color:#fff;">
                    <div style="font-size:2.5rem;font-weight:700;">
                        <span th:text="${#numbers.formatDecimal(avgRating,1,'COMMA',1,'POINT')}">4.9</span>
                        <i class="fa fa-star" style="color:#ffe066;"></i>
                    </div>
                    <div style="font-size:1.1rem;">Average Rating</div>
                    <div style="font-size:0.95rem;color:#e0e0e0;">From your vehicles only</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="rounded p-4 text-center" style="background:#ffe5e5 ;">
                    <div style="font-size:2.5rem;font-weight:700;color:#6c63ff;">
                        RM <span th:text="${#numbers.formatDecimal(accumulatedMoney,1,'COMMA',2,'POINT')}">0.00</span>
                    </div>
                    <div style="font-size:1.1rem;">Accumulated Money</div>
                    <div style="font-size:0.95rem;color:#888;">Total money you has collected</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="rounded p-4 text-center" style="background:#ffe5e5 ;">
                    <div style="font-size:2.5rem;font-weight:700;color:#6c63ff;">
                        +<span th:text="${#numbers.formatDecimal(salesThisMonth,1,'COMMA',2,'POINT')}">0.00</span>
                    </div>
                    <div style="font-size:1.1rem;">Sales This Month</div>
                    <div style="font-size:0.95rem;color:#888;">From your vehicle rentals</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
