<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicle Report</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="/css/try.css">
    <link rel="stylesheet" href="/css/list.css">
    <link rel="icon" type="image/x-icon" href="/images/logo.png">
</head>
<body id="body-pd">
    <div th:replace="navbarA :: navbar(${userID})"></div>
    <div class="container">
        <h1>Vehicle Report</h1>
        <div class="row mb-3">
            <div class="col-md-2">
                <select id="sortPlate" class="form-control">
                    <option value="">Sort Plate</option>
                    <option value="az">A - Z</option>
                    <option value="za">Z - A</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="sortType" class="form-control">
                    <option value="">All Types</option>
                    <option value="motorcycle">Motorcycle</option>
                    <option value="car">Car</option>
                    <option value="van">Van</option>
                    <option value="bus">Bus</option>
                    <option value="lorry">Lorry</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="sortPrice" class="form-control">
                    <option value="">Sort by Price</option>
                    <option value="expensive">Expensive - Cheapest</option>
                    <option value="cheapest">Cheapest - Expensive</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="sortStatus" class="form-control">
                    <option value="">All Status</option>
                    <option value="approved">Approved</option>
                    <option value="requested">Requested</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>
        </div>
        <input type="text" id="searchInput" class="form-control" placeholder="Search for vehicles..">

        <div style="overflow-x:auto;">
            <table class="table table-striped" id="vehicleTable">
                <thead>
                    <tr>
                        <th>Plate Number</th>
                        <th>Type</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Owner Name</th>
                        <th>Vehicle Picture</th>
                        <th>Vehicle Certificate</th>
                        <th>Driver License</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="dto : ${vehicleOwnerDTOs}">
                        <td th:text="${dto.vehiclePlateNumber}"></td>
                        <td th:text="${dto.vehicleType}"></td>
                        <td th:text="${dto.vehiclePrice}"></td>
                        <td th:text="${dto.vehicleStatus}"></td>
                        <td th:text="${dto.ownerName}"></td>
                        <!-- Vehicle Picture -->
                        <td>
                            <img th:src="'data:image/jpeg;base64,' + ${dto.vehiclePicString}" alt="Vehicle Picture"
                                style="width: 100px; height: auto; cursor:pointer;"
                                th:onclick="'showModalImage(this.src)'" />
                        </td>
                        <!-- Vehicle OC -->
                        <td>
                            <img th:if="${dto.vehicleOCString != null}" th:src="'data:image/jpeg;base64,' + ${dto.vehicleOCString}" alt="Vehicle OC"
                                style="width: 100px; height: auto; cursor:pointer;"
                                th:onclick="'showModalImage(this.src)'" />
                        </td>
                        <!-- Owner DL -->
                        <td>
                            <img th:if="${dto.ownerDLString != null}" th:src="'data:image/png;base64,' + ${dto.ownerDLString}" alt="Owner DL"
                                style="width: 100px; height: auto; cursor:pointer;"
                                th:onclick="'showModalImage(this.src)'" />
                        </td>
                        <td th:text="${dto.vehicleAddress}">Location</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <br><br>
        <button type="button" class="btn btn-primary" th:onclick="'window.location.href=\'/reportType?userID=' + ${userID} + '\''">Back to Report Type</button>
    </div>
    <!-- Image Modal (same as vehicleApproval) -->
    <div id="imgModal" class="modal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; overflow:auto; background:rgba(0,0,0,0.8);">
        <span style="position:absolute;top:20px;right:35px;color:#fff;font-size:40px;font-weight:bold;cursor:pointer;" onclick="closeModalImage()">&times;</span>
        <img id="modalImg" style="margin:auto;display:block;max-width:80%;max-height:80%;position:absolute;top:0;left:0;right:0;bottom:0;">
    </div>
    <script>
        function showModalImage(src) {
            document.getElementById('imgModal').style.display = 'block';
            document.getElementById('modalImg').src = src;
        }
        function closeModalImage() {
            document.getElementById('imgModal').style.display = 'none';
        }
        document.getElementById('searchInput').addEventListener('keyup', function() {
            var searchTerm = this.value.toLowerCase();
            var table = document.getElementById('vehicleTable');
            var rows = table.getElementsByTagName('tr');
            for (var i = 1; i < rows.length; i++) {
                var cells = rows[i].getElementsByTagName('td');
                var found = false;
                for (var j = 0; j < cells.length; j++) {
                    if (cells[j].querySelector('img')) continue; // <-- Prevent image cell overwrite
                    var cellText = cells[j].innerText.toLowerCase();
                    if (cellText.includes(searchTerm)) {
                        found = true;
                        var regex = new RegExp(searchTerm, 'gi');
                        cells[j].innerHTML = cells[j].innerText.replace(regex, function(match) {
                            return '<span class="highlight">' + match + '</span>';
                        });
                    } else {
                        cells[j].innerHTML = cells[j].innerText;
                    }
                }
                rows[i].style.display = found ? '' : 'none';
            }
        });
    </script>

    <script>
        // sorting and filtering functionality
        document.getElementById('sortPlate').addEventListener('change', filterVehicleTable);
        document.getElementById('sortType').addEventListener('change', filterVehicleTable);
        document.getElementById('sortPrice').addEventListener('change', filterVehicleTable);
        document.getElementById('sortStatus').addEventListener('change', filterVehicleTable);

        function filterVehicleTable() {
            var sortPlate = document.getElementById('sortPlate').value;
            var sortType = document.getElementById('sortType').value.toLowerCase();
            var sortPrice = document.getElementById('sortPrice').value;
            var sortStatus = document.getElementById('sortStatus').value.toLowerCase();
            var table = document.getElementById('vehicleTable');
            var tbody = table.getElementsByTagName('tbody')[0];
            var rows = Array.from(tbody.getElementsByTagName('tr'));

            // Filter by type and status
            rows.forEach(function(row) {
                var type = row.getElementsByTagName('td')[1].innerText.toLowerCase();
                var status = row.getElementsByTagName('td')[3].innerText.toLowerCase();
                var show = true;
                if (sortType && type !== sortType) show = false;
                if (sortStatus && status !== sortStatus) show = false;
                row.style.display = show ? '' : 'none';
            });

            // Only sort visible rows
            var visibleRows = rows.filter(row => row.style.display !== 'none');

            // Sort by plate number
            if (sortPlate) {
                visibleRows.sort(function(a, b) {
                    var plateA = a.getElementsByTagName('td')[0].innerText.toLowerCase();
                    var plateB = b.getElementsByTagName('td')[0].innerText.toLowerCase();
                    if (plateA < plateB) return sortPlate === 'az' ? -1 : 1;
                    if (plateA > plateB) return sortPlate === 'az' ? 1 : -1;
                    return 0;
                });
            }

            // Sort by price
            if (sortPrice) {
                visibleRows.sort(function(a, b) {
                    var priceA = parseFloat(a.getElementsByTagName('td')[2].innerText.replace(/[^0-9.]/g, '')) || 0;
                    var priceB = parseFloat(b.getElementsByTagName('td')[2].innerText.replace(/[^0-9.]/g, '')) || 0;
                    return sortPrice === 'expensive' ? priceB - priceA : priceA - priceB;
                });
            }

            // Custom status sort: requested (0), rejected (1), approved (2)
            if (!sortPrice && !sortPlate && sortStatus === "") {
                var statusOrder = { "requested": 0, "rejected": 1, "approved": 2 };
                visibleRows.sort(function(a, b) {
                    var statusA = statusOrder[a.getElementsByTagName('td')[3].innerText.toLowerCase()] ?? 99;
                    var statusB = statusOrder[b.getElementsByTagName('td')[3].innerText.toLowerCase()] ?? 99;
                    return statusA - statusB;
                });
            }

            // Re-append sorted rows
            visibleRows.forEach(row => tbody.appendChild(row));
        }
    </script>
</body>
</html>
